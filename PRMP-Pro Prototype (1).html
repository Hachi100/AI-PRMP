<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1440" />
<title>PRMP-Pro — Plateforme de gestion des marchés publics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
  :root {
    /* Accents — default: institutional blue */
    --accent-h: 220;
    --accent-s: 75%;
    --accent-l: 52%;
    --accent: oklch(55% 0.17 255);
    --accent-fg: #ffffff;
    --accent-soft: oklch(96% 0.025 255);
    --accent-border: oklch(88% 0.06 255);

    /* Surfaces — light */
    --bg: oklch(99% 0.003 250);
    --bg-sub: oklch(97.5% 0.004 250);
    --panel: oklch(100% 0 0);
    --panel-2: oklch(98.5% 0.003 250);
    --border: oklch(92% 0.006 250);
    --border-strong: oklch(86% 0.008 250);
    --text: oklch(22% 0.01 250);
    --text-2: oklch(42% 0.012 250);
    --text-3: oklch(58% 0.012 250);
    --text-4: oklch(72% 0.01 250);

    /* Semantic */
    --ok: oklch(60% 0.14 155);
    --ok-soft: oklch(96% 0.03 155);
    --warn: oklch(72% 0.14 75);
    --warn-soft: oklch(96% 0.04 85);
    --crit: oklch(58% 0.18 22);
    --crit-soft: oklch(96% 0.03 22);
    --info: oklch(60% 0.12 250);
    --info-soft: oklch(96% 0.02 250);

    /* Density */
    --unit: 4px;
    --row-h: 40px;
    --ctl-h: 32px;
    --radius: 8px;
    --radius-lg: 12px;
    --pad-card: 20px;
    --pad-section: 24px;
    --text-base: 13px;
    --text-sm: 12px;
    --text-xs: 11px;

    --sidebar-w: 232px;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --serif: 'Instrument Serif', Georgia, serif;
    --shadow-sm: 0 1px 2px rgba(16,24,40,.04), 0 1px 1px rgba(16,24,40,.02);
    --shadow: 0 4px 12px rgba(16,24,40,.06), 0 1px 2px rgba(16,24,40,.03);
    --shadow-lg: 0 24px 48px rgba(16,24,40,.14), 0 2px 6px rgba(16,24,40,.04);
  }

  /* Accent variants */
  [data-accent="blue"]   { --accent: oklch(55% 0.17 255); --accent-soft: oklch(96% 0.025 255); --accent-border: oklch(88% 0.06 255); }
  [data-accent="green"]  { --accent: oklch(50% 0.14 150); --accent-soft: oklch(96% 0.03 150); --accent-border: oklch(85% 0.07 150); }
  [data-accent="purple"] { --accent: oklch(52% 0.19 295); --accent-soft: oklch(96% 0.03 295); --accent-border: oklch(88% 0.07 295); }

  /* Density variants */
  [data-density="compact"] {
    --row-h: 32px; --ctl-h: 28px; --pad-card: 14px; --pad-section: 16px;
    --text-base: 12.5px; --text-sm: 11.5px; --text-xs: 10.5px;
    --radius: 6px; --radius-lg: 10px;
  }

  /* Dark theme */
  [data-theme="dark"] {
    --bg: oklch(16% 0.008 250);
    --bg-sub: oklch(19% 0.009 250);
    --panel: oklch(21% 0.009 250);
    --panel-2: oklch(24% 0.009 250);
    --border: oklch(28% 0.011 250);
    --border-strong: oklch(34% 0.013 250);
    --text: oklch(96% 0.005 250);
    --text-2: oklch(78% 0.008 250);
    --text-3: oklch(62% 0.01 250);
    --text-4: oklch(48% 0.01 250);
    --accent-soft: oklch(28% 0.05 255);
    --accent-border: oklch(38% 0.09 255);
    --ok-soft: oklch(28% 0.05 155);
    --warn-soft: oklch(30% 0.06 75);
    --crit-soft: oklch(28% 0.06 22);
    --info-soft: oklch(28% 0.05 250);
    --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
    --shadow: 0 4px 14px rgba(0,0,0,.35);
    --shadow-lg: 0 24px 48px rgba(0,0,0,.5);
  }
  [data-theme="dark"][data-accent="blue"]   { --accent-soft: oklch(28% 0.06 255); --accent-border: oklch(40% 0.09 255); }
  [data-theme="dark"][data-accent="green"]  { --accent-soft: oklch(26% 0.05 150); --accent-border: oklch(38% 0.08 150); }
  [data-theme="dark"][data-accent="purple"] { --accent-soft: oklch(28% 0.07 295); --accent-border: oklch(40% 0.1 295); }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: var(--text-base);
    color: var(--text);
    background: var(--bg-sub);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: 'ss01', 'cv11';
    letter-spacing: -0.005em;
  }
  button { font-family: inherit; font-size: inherit; color: inherit; cursor: pointer; border: none; background: none; }
  input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; }
  a { color: inherit; text-decoration: none; }

  .app {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    min-height: 100vh;
  }

  /* ============ SIDEBAR ============ */
  .sidebar {
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 14px 10px 20px;
    display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh;
    overflow-y: auto;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 8px 14px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
  }
  .brand-mark {
    width: 28px; height: 28px; border-radius: 7px;
    background: linear-gradient(135deg, var(--accent), oklch(from var(--accent) calc(l - 0.1) c h));
    display: grid; place-items: center;
    color: var(--accent-fg);
    font-weight: 700; font-size: 13px;
    letter-spacing: -0.03em;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.2);
  }
  .brand-name {
    font-weight: 600; font-size: 14px; letter-spacing: -0.02em;
  }
  .brand-sub {
    font-size: 10.5px; color: var(--text-3);
    font-family: var(--mono);
    letter-spacing: 0;
  }
  .org-switcher {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: var(--text-sm);
    margin: 0 4px 14px;
    background: var(--panel-2);
    cursor: pointer;
  }
  .org-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); flex-shrink: 0; }
  .org-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
  .org-chev { color: var(--text-3); }

  .nav-section-title {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-4); font-weight: 600;
    padding: 12px 12px 6px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 10px; margin: 1px 0;
    border-radius: 6px;
    font-size: var(--text-sm);
    color: var(--text-2);
    cursor: pointer;
    transition: background .12s;
    position: relative;
  }
  .nav-item:hover { background: var(--panel-2); color: var(--text); }
  .nav-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 500; }
  .nav-item.active .nav-icon { color: var(--accent); }
  .nav-icon { width: 16px; height: 16px; color: var(--text-3); flex-shrink: 0; }
  .nav-badge {
    margin-left: auto;
    font-size: 10px; padding: 1px 6px; border-radius: 10px;
    background: var(--crit); color: white; font-weight: 600;
    font-family: var(--mono);
  }

  .sidebar-footer {
    margin-top: auto; padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .user-card {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 8px; border-radius: 6px; cursor: pointer;
  }
  .user-card:hover { background: var(--panel-2); }
  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, oklch(75% 0.1 60), oklch(55% 0.14 30));
    color: white; font-weight: 600; font-size: 11px;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .user-info { flex: 1; overflow: hidden; min-width: 0; }
  .user-name { font-weight: 500; font-size: var(--text-sm); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 10.5px; color: var(--text-3); }

  /* ============ MAIN ============ */
  .main {
    display: flex; flex-direction: column;
    min-width: 0;
    background: var(--bg-sub);
  }
  .topbar {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 28px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 20;
  }
  .crumbs { display: flex; align-items: center; gap: 6px; font-size: var(--text-sm); color: var(--text-3); }
  .crumbs .current { color: var(--text); font-weight: 500; }
  .crumb-sep { color: var(--text-4); }
  .topbar-spacer { flex: 1; }

  .search {
    display: flex; align-items: center; gap: 8px;
    width: 320px; height: var(--ctl-h);
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0 10px;
    font-size: var(--text-sm);
    color: var(--text-3);
  }
  .search kbd {
    font-family: var(--mono); font-size: 10px;
    padding: 1px 5px; border: 1px solid var(--border-strong);
    border-radius: 3px; background: var(--panel);
    color: var(--text-3);
  }
  .search-input { flex: 1; background: none; border: none; outline: none; }

  .icon-btn {
    width: var(--ctl-h); height: var(--ctl-h);
    display: grid; place-items: center;
    border-radius: var(--radius); color: var(--text-2);
    position: relative;
  }
  .icon-btn:hover { background: var(--panel-2); color: var(--text); }
  .icon-btn .dot {
    position: absolute; top: 6px; right: 6px;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--crit);
    border: 2px solid var(--panel);
  }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    height: var(--ctl-h); padding: 0 12px;
    border-radius: var(--radius);
    font-size: var(--text-sm); font-weight: 500;
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border);
    transition: all .12s;
  }
  .btn:hover { background: var(--panel-2); border-color: var(--border-strong); }
  .btn.primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
  .btn.primary:hover { filter: brightness(1.06); }
  .btn.ghost { border-color: transparent; background: transparent; }
  .btn.ghost:hover { background: var(--panel-2); }
  .btn.danger { color: var(--crit); border-color: var(--border); }
  .btn.sm { height: 26px; padding: 0 8px; font-size: 11.5px; }

  /* ============ PAGE CONTAINER ============ */
  .page {
    padding: var(--pad-section) 28px 40px;
    max-width: 1280px;
    width: 100%;
    margin: 0 auto;
  }
  .page-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 20px; margin-bottom: 20px;
  }
  .page-title {
    font-size: 22px; font-weight: 600;
    letter-spacing: -0.02em;
    margin: 0 0 4px;
  }
  .page-subtitle { font-size: var(--text-sm); color: var(--text-3); margin: 0; }
  .page-actions { display: flex; gap: 8px; }

  /* ============ CARDS ============ */
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: var(--pad-card);
  }
  .card-hdr {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 13px; font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0;
  }
  .card-sub { font-size: var(--text-xs); color: var(--text-3); margin-top: 2px; }

  .grid { display: grid; gap: 14px; }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .grid-2 { grid-template-columns: repeat(2, 1fr); }

  /* ============ BADGES ============ */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px; font-weight: 500;
    background: var(--panel-2);
    color: var(--text-2);
    border: 1px solid var(--border);
    white-space: nowrap;
    line-height: 1.4;
  }
  .badge.ok { background: var(--ok-soft); color: oklch(42% 0.13 155); border-color: transparent; }
  .badge.warn { background: var(--warn-soft); color: oklch(45% 0.13 60); border-color: transparent; }
  .badge.crit { background: var(--crit-soft); color: var(--crit); border-color: transparent; }
  .badge.info { background: var(--info-soft); color: oklch(45% 0.14 250); border-color: transparent; }
  .badge.accent { background: var(--accent-soft); color: var(--accent); border-color: transparent; }
  [data-theme="dark"] .badge.ok { color: oklch(78% 0.14 155); }
  [data-theme="dark"] .badge.warn { color: oklch(82% 0.14 80); }
  [data-theme="dark"] .badge.crit { color: oklch(72% 0.15 22); }
  [data-theme="dark"] .badge.info { color: oklch(78% 0.12 250); }

  .badge-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor;
  }

  /* ============ TABLES ============ */
  .table {
    width: 100%;
    border-collapse: collapse;
    font-size: var(--text-sm);
  }
  .table th {
    text-align: left;
    font-weight: 500;
    font-size: 11px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--panel-2);
    position: sticky; top: 0;
  }
  .table td {
    padding: 10px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .table tbody tr { transition: background .1s; }
  .table tbody tr:hover { background: var(--panel-2); }
  .table tbody tr.clickable { cursor: pointer; }
  .table .num { font-family: var(--mono); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .table .ref { font-family: var(--mono); font-size: 11px; color: var(--text-3); }
  .table .ellipsis { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ============ KPI ============ */
  .kpi { position: relative; }
  .kpi-label {
    font-size: 11px; color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.06em;
    font-weight: 500;
    margin-bottom: 10px;
  }
  .kpi-value {
    font-size: 28px; font-weight: 600;
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
  }
  .kpi-value .unit { font-size: 14px; color: var(--text-3); font-weight: 500; margin-left: 4px; }
  .kpi-delta {
    display: flex; align-items: center; gap: 8px;
    margin-top: 10px; font-size: 11px; color: var(--text-3);
  }
  .kpi-delta .val { font-weight: 500; font-family: var(--mono); }
  .kpi-delta .val.up { color: var(--ok); }
  .kpi-delta .val.down { color: var(--crit); }
  .kpi-spark {
    position: absolute; right: var(--pad-card); top: var(--pad-card);
    width: 80px; height: 32px;
  }

  /* ============ UTIL ============ */
  .hstack { display: flex; align-items: center; gap: 10px; }
  .vstack { display: flex; flex-direction: column; gap: 10px; }
  .spacer { flex: 1; }
  .muted { color: var(--text-3); }
  .mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }
  .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

  /* Page switch animation */
  .page-view { animation: fadeIn .18s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  /* Scroll */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 10px; border: 2px solid var(--bg-sub); }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-4); }

  /* Tooltip for banner */
  .ai-banner {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    background: var(--warn-soft);
    color: oklch(40% 0.13 60);
    border: 1px solid oklch(90% 0.08 70);
    border-radius: var(--radius);
    font-size: 11.5px;
    margin-bottom: 14px;
  }
  [data-theme="dark"] .ai-banner { border-color: oklch(38% 0.1 75); color: oklch(82% 0.12 75); }
</style>
</head>
